name: Docs Sync Engine

on:
  workflow_call:
    inputs:
      run_mode:
        description: "Invocation mode: 'pr' for merged-PR flow, 'manual' for state-based sync"
        required: false
        default: "pr"
        type: string
      base_ref:
        description: "Base branch to checkout for documentation updates"
        required: true
        type: string
      pr_number:
        description: "Pull request number"
        required: false
        default: ""
        type: string
      pr_merge_sha:
        description: "Merge commit SHA for required check monitoring"
        required: false
        default: ""
        type: string
      mapping_path:
        description: "Path to service mapping file in caller repository"
        required: true
        type: string
      pr_diff_path:
        description: "Path to temporary PR diff file"
        required: false
        default: "pr.diff"
        type: string
      engine_ref:
        description: "Git ref (commit SHA/tag/branch) used to checkout the docs-sync engine repository"
        required: true
        type: string
      docs_sync_debug:
        description: "Enable verbose docs sync debug logs"
        required: false
        default: "false"
        type: string
      docs_sync_llm_provider:
        description: "LLM provider used by docs sync script"
        required: true
        type: string
      claude_code_command:
        description: "Command used to invoke Claude Code"
        required: true
        type: string
      python_version:
        description: "Python version for runtime"
        required: true
        type: string
      node_version:
        description: "Node.js version for runtime"
        required: true
        type: string
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      CONFLUENCE_BASE_URL:
        required: true
      CONFLUENCE_SPACE_KEY:
        required: true
      CONFLUENCE_USER_EMAIL:
        required: true
      CONFLUENCE_API_TOKEN:
        required: true

concurrency:
  group: docs-sync-${{ github.repository }}-${{ inputs.base_ref }}
  cancel-in-progress: false

jobs:
  wait_for_required_checks:
    if: inputs.run_mode == 'pr'
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: read
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_ref }}
      - name: Checkout docs-sync engine repository
        uses: actions/checkout@v4
        with:
          repository: panda-don0/autodocs
          ref: ${{ inputs.engine_ref }}
          path: .docs-sync-engine
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml
      - name: Wait for required checks
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_MERGE_SHA: ${{ inputs.pr_merge_sha }}
        run: python .docs-sync-engine/scripts/wait_required_checks.py

  sync_technical_docs_pr:
    if: inputs.run_mode == 'pr'
    runs-on: ubuntu-latest
    needs: wait_for_required_checks
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout caller repository base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_ref }}
          fetch-depth: 0
      - name: Checkout docs-sync engine repository
        uses: actions/checkout@v4
        with:
          repository: panda-don0/autodocs
          ref: ${{ inputs.engine_ref }}
          path: .docs-sync-engine
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
      - name: Install dependencies
        run: python -m pip install --upgrade pip requests pyyaml
      - name: Fetch PR diff
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PR_DIFF_PATH: ${{ inputs.pr_diff_path }}
        run: |
          curl -sS -L \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3.diff" \
            "https://api.github.com/repos/${REPO}/pulls/${PR_NUMBER}" > "${PR_DIFF_PATH}"
      - name: Run docs sync
        env:
          DOCS_SYNC_DEBUG: ${{ inputs.docs_sync_debug }}
          DOCS_SYNC_LLM_PROVIDER: ${{ inputs.docs_sync_llm_provider }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CLAUDE_CODE_COMMAND: ${{ inputs.claude_code_command }}
          CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_SPACE_KEY: ${{ secrets.CONFLUENCE_SPACE_KEY }}
          CONFLUENCE_USER_EMAIL: ${{ secrets.CONFLUENCE_USER_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: python .docs-sync-engine/scripts/docs_sync.py --mapping "${{ inputs.mapping_path }}" --run-mode pr --pr-diff "${{ inputs.pr_diff_path }}"
      - name: Commit technical docs changes
        env:
          PR_DIFF_PATH: ${{ inputs.pr_diff_path }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "${PR_DIFF_PATH}" ]; then
            rm -f "${PR_DIFF_PATH}"
          fi
          if compgen -G "technical-readme*.md" > /dev/null; then
            git add technical-readme*.md
          else
            echo "No technical readme files found to stage."
          fi
          if git diff --cached --quiet; then
            echo "No technical docs changes to commit."
            exit 0
          fi
          cat > .git/docs-sync-commit-msg.txt << 'EOF'
          🤏 minor: update technical documentation

          **What changed**
          - Updated technical readme output from automated docs sync

          **Why it changed**
          - Keep technical docs aligned with current repository implementation state

          Authored-By: Claude
          EOF
          git commit -F .git/docs-sync-commit-msg.txt
          git push origin "${{ inputs.base_ref }}"

  sync_technical_docs_manual:
    if: inputs.run_mode == 'manual'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout caller repository base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_ref }}
          fetch-depth: 0
      - name: Checkout docs-sync engine repository
        uses: actions/checkout@v4
        with:
          repository: panda-don0/autodocs
          ref: ${{ inputs.engine_ref }}
          path: .docs-sync-engine
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
      - name: Install dependencies
        run: python -m pip install --upgrade pip requests pyyaml
      - name: Run docs sync (manual mode)
        env:
          DOCS_SYNC_DEBUG: ${{ inputs.docs_sync_debug }}
          DOCS_SYNC_LLM_PROVIDER: ${{ inputs.docs_sync_llm_provider }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CLAUDE_CODE_COMMAND: ${{ inputs.claude_code_command }}
          CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_SPACE_KEY: ${{ secrets.CONFLUENCE_SPACE_KEY }}
          CONFLUENCE_USER_EMAIL: ${{ secrets.CONFLUENCE_USER_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
        run: python .docs-sync-engine/scripts/docs_sync.py --mapping "${{ inputs.mapping_path }}" --run-mode manual
      - name: Commit technical docs changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if compgen -G "technical-readme*.md" > /dev/null; then
            git add technical-readme*.md
          else
            echo "No technical readme files found to stage."
          fi
          if git diff --cached --quiet; then
            echo "No technical docs changes to commit."
            exit 0
          fi
          cat > .git/docs-sync-commit-msg.txt << 'EOF'
          🤏 minor: update technical documentation

          **What changed**
          - Updated technical readme output from automated docs sync

          **Why it changed**
          - Keep technical docs aligned with current repository implementation state

          Authored-By: Claude
          EOF
          git commit -F .git/docs-sync-commit-msg.txt
          git push origin "${{ inputs.base_ref }}"
